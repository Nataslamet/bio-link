<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Nata Slamet</title>
    <style>
        /* Gaya Tampilan (CSS) */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f4f9; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 20px; 
            margin: 0;
        }
        .profile-img { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            object-fit: cover; 
            margin-bottom: 20px;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { 
            margin: 0 0 10px 0; 
            font-size: 24px; 
            color: #333; 
        }
        p { 
            margin: 0 0 30px 0; 
            color: #666; 
            text-align: center; 
        }
        .link-container { 
            width: 100%; 
            max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .link-btn { 
            display: block; 
            padding: 15px 20px; 
            background: #ffffff; 
            color: #333; 
            text-decoration: none; 
            text-align: center; 
            border-radius: 10px; 
            font-weight: 600; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: all 0.3s ease; 
            border: 1px solid #eaeaea; 
        }
        .link-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.1); 
            background: #fafafa; 
        }
        /* Footer kecil */
        .footer {
            margin-top: 50px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <!-- Ganti URL di dalam src="" dengan link foto lo -->
    <img src="https://raw.githubusercontent.com/Nataslamet/bio-link/refs/heads/main/FB_IMG_1781914631431.jpg" alt="Foto Profil" class="profile-img">
    
    <h1>Nata Slamet</h1>
    <p>Selamat datang di profil saya!</p>
    
    <div class="link-container">
        <!-- Ganti tanda # dengan link tujuan lo -->
        <a href="https://instagram.com/naatt.taa" class="link-btn" target="_blank">📸 Instagram</a>
        <a href="https://wa.me/628991544516" class="link-btn" target="_blank">💬 WhatsApp</a>
        <a href="#" class="link-btn" target="_blank">💼 LinkedIn / Portofolio</a>
        <a href="#" class="link-btn" target="_blank">🛒 Etalase / Toko</a>
    </div>

    <div class="footer">
        © 2026 Nata Slamet
    </div>

</body>
</html>
